[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trio-algorithms"
version = "0.1.0"
description = "TRIO scoring engines — RBA + MLA share one ScoreResponse contract"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "scikit-learn>=1.4",
    "joblib>=1.3",
    "numpy>=1.26",
]

[tool.setuptools.packages.find]
include = ["trio_algorithms*"]
