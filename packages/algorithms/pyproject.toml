[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trio-algorithms"
version = "0.1.0"
description = "TRIO scoring engines — RBA + MLA share one ScoreResponse contract"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
]

[tool.setuptools.packages.find]
include = ["trio_algorithms*"]
