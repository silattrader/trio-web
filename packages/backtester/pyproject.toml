[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trio-backtester"
version = "0.1.0"
description = "Hosted backtest engine for TRIO strategies — SMA (price-only) + RBA-snapshot (lookahead-flagged)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "yfinance>=0.2.50",
    "trio-algorithms>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[tool.setuptools.packages.find]
include = ["trio_backtester*"]
