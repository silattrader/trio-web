name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python · pytest + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workspace
        run: |
          pip install --upgrade pip
          pip install -e packages/algorithms
          pip install -e packages/data_providers
          pip install -e packages/backtester
          pip install -e "apps/api[dev]"

      - name: Lint
        run: ruff check packages apps/api

      - name: Test
        run: cd apps/api && pytest -q

  web:
    name: Web · tsc + next build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
